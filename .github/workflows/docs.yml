name: Documentation

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-docs-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-docs-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -r docs/requirements.txt
        pip install -e .

    - name: Build documentation
      run: |
        cd docs
        # Generate API documentation
        sphinx-apidoc -o api ../POMDPPlanners --force --module-first
        # Build HTML documentation
        sphinx-build -b html . _build/html -W --keep-going

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/

    - name: Setup Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: actions/configure-pages@v3
      continue-on-error: true  # Skip if Pages not available (private repo)

    - name: Upload to GitHub Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: actions/upload-pages-artifact@v2
      with:
        path: docs/_build/html/
      continue-on-error: true  # Skip if Pages not available (private repo)

  deploy-docs:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
      continue-on-error: true  # Skip if Pages not available (private repo)

    - name: Pages deployment status
      run: |
        if [ "${{ steps.deployment.outcome }}" = "failure" ]; then
          echo "ℹ️ GitHub Pages deployment failed - this is expected for private repositories"
          echo "📚 Documentation was built successfully and is available as artifacts"
          echo "🚀 Enable GitHub Pages when repository becomes public"
        else
          echo "✅ Documentation deployed successfully to GitHub Pages"
        fi

  check-docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -r docs/requirements.txt
        pip install -e .

    - name: Check documentation builds
      run: |
        cd docs
        sphinx-apidoc -o api ../POMDPPlanners --force --module-first
        sphinx-build -b html . _build/html -W

    - name: Check for broken links
      run: |
        cd docs
        sphinx-build -b linkcheck . _build/linkcheck
      continue-on-error: true  # Don't fail on external link issues

    - name: Validate documentation coverage
      run: |
        cd docs
        # Check that all public modules have documentation
        sphinx-build -b coverage . _build/coverage
        if [ -f "_build/coverage/python.txt" ]; then
          echo "Documentation coverage issues found:"
          cat _build/coverage/python.txt
        fi
      continue-on-error: true