name: Docker Tests

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

permissions:
  contents: read
  packages: write

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        echo "Disk space before cleanup:"
        df -h
        # Remove unnecessary pre-installed software
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get clean
        echo "Disk space after cleanup:"
        df -h

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build test Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/Dockerfile.ci
        load: true
        tags: pomdpplanners-test:latest
        build-args: |
          BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/pomdpplanners-base:latest

    - name: Run linting inside Docker
      run: |
        docker run --rm --entrypoint pylint pomdpplanners-test:latest POMDPPlanners/core/ POMDPPlanners/environments/ POMDPPlanners/planners/ POMDPPlanners/simulations/ POMDPPlanners/utils/ POMDPPlanners/configs/ --exit-zero

    - name: Run code formatting check inside Docker
      run: |
        docker run --rm --entrypoint black pomdpplanners-test:latest --check POMDPPlanners/core/ POMDPPlanners/environments/ POMDPPlanners/planners/ POMDPPlanners/simulations/ POMDPPlanners/utils/ POMDPPlanners/configs/

    - name: Run pyright type checking inside Docker
      run: |
        docker run --rm --entrypoint pyright pomdpplanners-test:latest POMDPPlanners/

    - name: Run unit tests inside Docker (excluding slow tests)
      run: |
        docker run --rm --entrypoint pytest pomdpplanners-test:latest POMDPPlanners/tests/ -v --cov=POMDPPlanners --cov-report=xml --cov-report=term-missing -m "not slow"

    - name: Run notebook smoke tests inside Docker
      run: |
        docker run --rm --entrypoint pytest pomdpplanners-test:latest POMDPPlanners/tests/test_examples/test_notebook_examples.py -v -m "smoke" --tb=short
      continue-on-error: true  # Don't fail CI if smoke tests have issues, but show results

    - name: Run doctests inside Docker
      run: |
        docker run --rm --entrypoint pytest pomdpplanners-test:latest --doctest-modules POMDPPlanners/core/ POMDPPlanners/environments/ POMDPPlanners/planners/ POMDPPlanners/simulations/ POMDPPlanners/utils/ POMDPPlanners/configs/ -v


    # Visualization examples removed - legacy files not available

    - name: Build documentation inside Docker
      run: |
        docker run --rm --entrypoint sphinx-build pomdpplanners-test:latest -b html docs docs/_build/html
      continue-on-error: true  # Don't fail the build if docs have warnings

    - name: Clean up Docker space before production build
      run: |
        echo "Disk space before cleanup:"
        df -h
        # Remove dangling images and build cache
        docker system prune -f
        docker builder prune -f --keep-storage 5GB
        echo "Disk space after cleanup:"
        df -h

    - name: Build and push production image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:latest
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract coverage from Docker container
      run: |
        # Create a temporary container to extract coverage file
        docker create --name temp-container pomdpplanners-test:latest
        docker cp temp-container:/app/coverage.xml ./coverage.xml || echo "No coverage file found"
        docker rm temp-container

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
