name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]  # Test key Python versions

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 POMDPPlanners --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 POMDPPlanners --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check POMDPPlanners/

    - name: Type check with pylint
      run: |
        pylint POMDPPlanners/ --exit-zero

    - name: Test with pytest
      run: |
        pytest POMDPPlanners/tests/ -v --cov=POMDPPlanners --cov-report=xml --cov-report=term-missing

    - name: Run doctests
      run: |
        pytest --doctest-modules POMDPPlanners/ -v

    - name: Test visualization examples
      run: |
        # Test visualization examples run without errors
        # Set matplotlib backend to avoid display issues in CI
        export MPLBACKEND=Agg
        python legacy/light_dark_pomdp_visualization_example.py
        python legacy/pomcpow_rock_sample_visualization_demo.py
        python legacy/push_pomdp_visualization_example.py
      continue-on-error: true  # Visualization examples may have display issues in CI

    - name: Build documentation
      if: matrix.python-version == '3.11'  # Only build docs once
      run: |
        cd docs
        sphinx-build -b html . _build/html
      continue-on-error: true  # Don't fail the build if docs have warnings

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false