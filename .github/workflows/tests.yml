name: Docker Tests

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build test Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        target: test
        load: true
        tags: pomdpplanners-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run linting inside Docker
      run: |
        docker run --rm pomdpplanners-test:latest pylint POMDPPlanners/ --exit-zero

    - name: Run code formatting check inside Docker
      run: |
        docker run --rm pomdpplanners-test:latest black --check POMDPPlanners/

    - name: Set up Python for pyright
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python dependencies for pyright
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Install Node.js for pyright
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pyright
      run: npm install -g pyright

    - name: Run pyright type checking
      run: pyright POMDPPlanners/

    - name: Run unit tests inside Docker (excluding slow tests)
      run: |
        docker run --rm pomdpplanners-test:latest pytest POMDPPlanners/tests/ -v --cov=POMDPPlanners --cov-report=xml --cov-report=term-missing -m "not slow"

    - name: Run notebook smoke tests inside Docker
      run: |
        docker run --rm pomdpplanners-test:latest pytest POMDPPlanners/tests/test_examples/test_notebook_examples.py -v -m "smoke" --tb=short
      continue-on-error: true  # Don't fail CI if smoke tests have issues, but show results

    - name: Run doctests inside Docker
      run: |
        docker run --rm pomdpplanners-test:latest pytest --doctest-modules POMDPPlanners/core/ POMDPPlanners/environments/ POMDPPlanners/planners/ POMDPPlanners/simulations/ POMDPPlanners/utils/ POMDPPlanners/configs/ -v


    # Visualization examples removed - legacy files not available

    - name: Build documentation inside Docker
      run: |
        docker run --rm -w /app/docs pomdpplanners-test:latest sphinx-build -b html . _build/html
      continue-on-error: true  # Don't fail the build if docs have warnings

    - name: Build and push production image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:latest
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Extract coverage from Docker container
      run: |
        # Create a temporary container to extract coverage file
        docker create --name temp-container pomdpplanners-test:latest
        docker cp temp-container:/app/coverage.xml ./coverage.xml || echo "No coverage file found"
        docker rm temp-container

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false