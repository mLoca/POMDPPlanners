name: Docker Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Add explicit permissions
permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push test image
      uses: docker/build-push-action@v4
      with:
        context: .
        target: test
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/pomdpplanners/test:latest
          ghcr.io/${{ github.repository_owner }}/pomdpplanners/test:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Run tests
      run: |
        docker run --rm ghcr.io/${{ github.repository_owner }}/pomdpplanners/test:latest pytest POMDPPlanners/tests -v
    
    - name: Build and push production image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:latest
          ghcr.io/${{ github.repository_owner }}/pomdpplanners:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max 