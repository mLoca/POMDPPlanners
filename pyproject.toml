[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]
include = '\\.(py|pyi)$'
exclude = '''
(
  /(
      \.git
    | \.mypy_cache
    | \.pytest_cache
    | \.venv
    | build
    | dist
    | docs/_build
  )/
)
'''


[tool.pyright]
exclude = [
    "temp_sim_cache/**",
    "test_hyper_param_cache/**",
    ".venv/**",
    "build/**",
    "dist/**",
    "docs/**",
    "docs/_build/**",
    "experiments/**",
    "legacy/**"
]
ignore = [
    "temp_sim_cache",
    "test_hyper_param_cache"
]
# OOP-friendly settings
pythonVersion = "3.9"
typeCheckingMode = "basic"  # or "strict" for more thorough checking
useLibraryCodeForTypes = true
strictListInference = true
strictDictionaryInference = true
strictSetInference = true
strictParameterNoneValue = true
enableTypeIgnoreComments = true

[tool.mypy]
python_version = "3.9"
show_error_codes = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_no_return = false
warn_return_any = false
ignore_missing_imports = true
# Temporarily exclude most of the codebase from mypy to get CI passing.
# We'll narrow this as we progressively type modules.
exclude = '''
(
  ^POMDPPlanners/core/|
  ^POMDPPlanners/environments/|
  ^POMDPPlanners/planners/|
  ^POMDPPlanners/simulations/|
  ^POMDPPlanners/tests/|
  ^POMDPPlanners/configs/|
  ^POMDPPlanners/utils/
)
'''


